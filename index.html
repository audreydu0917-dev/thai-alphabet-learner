<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai Alphabet Learner | Kusama Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --kusama-yellow: #FFE500;
      --kusama-orange: #FF6B00;
      --kusama-red: #FF1744;
      --kusama-pink: #FF69B4;
      --kusama-cyan: #00E5FF;
      --kusama-lime: #C6FF00;
      --kusama-purple: #AA00FF;
      --kusama-black: #1A1A1A;
      --kusama-white: #FFFEF0;
    }

    body {
      font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
      background: var(--kusama-yellow);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Polka dot background pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        radial-gradient(circle, var(--kusama-red) 8%, transparent 8%),
        radial-gradient(circle, var(--kusama-orange) 6%, transparent 6%),
        radial-gradient(circle, var(--kusama-pink) 5%, transparent 5%),
        radial-gradient(circle, var(--kusama-cyan) 7%, transparent 7%);
      background-size: 80px 80px, 120px 120px, 100px 100px, 90px 90px;
      background-position: 0 0, 40px 40px, 20px 60px, 60px 20px;
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
      position: relative;
      z-index: 1;
    }

    /* Header with Kusama style */
    header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--kusama-black);
      text-shadow:
        3px 3px 0 var(--kusama-yellow),
        6px 6px 0 var(--kusama-pink);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--kusama-red);
      font-weight: 600;
      background: var(--kusama-white);
      display: inline-block;
      padding: 6px 20px;
      border-radius: 30px;
      border: 3px solid var(--kusama-black);
    }

    /* Kusama pumpkin decoration */
    .kusama-pumpkin {
      width: 80px;
      height: 80px;
      margin: 20px auto;
      position: relative;
    }

    .kusama-pumpkin::before {
      content: '🎃';
      font-size: 70px;
      filter: drop-shadow(3px 3px 0 var(--kusama-black));
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--kusama-white);
      border: 4px solid var(--kusama-black);
      border-radius: 20px;
      padding: 12px 20px;
      text-align: center;
      min-width: 90px;
      box-shadow: 4px 4px 0 var(--kusama-black);
      transform: rotate(-1deg);
      transition: transform 0.2s;
    }

    .stat:hover {
      transform: rotate(1deg) scale(1.05);
    }

    .stat:nth-child(2) { transform: rotate(2deg); }
    .stat:nth-child(3) { transform: rotate(-2deg); }
    .stat:nth-child(4) { transform: rotate(1deg); }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--kusama-red);
    }

    .stat:nth-child(2) .stat-value { color: var(--kusama-orange); }
    .stat:nth-child(3) .stat-value { color: var(--kusama-lime); }
    .stat:nth-child(4) .stat-value { color: var(--kusama-purple); }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--kusama-black);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Navigation tabs - Kusama buttons */
    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tab-btn {
      background: var(--kusama-pink);
      border: 4px solid var(--kusama-black);
      color: var(--kusama-black);
      padding: 14px 28px;
      border-radius: 30px;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 4px 4px 0 var(--kusama-black);
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tab-btn:nth-child(1) { background: var(--kusama-yellow); }
    .tab-btn:nth-child(2) { background: var(--kusama-cyan); }
    .tab-btn:nth-child(3) { background: var(--kusama-lime); }
    .tab-btn:nth-child(4) { background: var(--kusama-orange); }

    .tab-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--kusama-black);
    }

    .tab-btn.active {
      background: var(--kusama-red);
      color: var(--kusama-white);
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--kusama-black);
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    /* Alphabet Grid - Kusama cards */
    .alpha-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 16px;
    }

    .alpha-card {
      background: var(--kusama-white);
      border-radius: 20px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 4px solid var(--kusama-black);
      box-shadow: 5px 5px 0 var(--kusama-black);
      position: relative;
      overflow: hidden;
    }

    .alpha-card::before {
      content: '';
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      background: var(--kusama-pink);
      border-radius: 50%;
      border: 2px solid var(--kusama-black);
    }

    .alpha-card:hover {
      transform: translate(-3px, -3px) rotate(-2deg);
      box-shadow: 8px 8px 0 var(--kusama-black);
    }

    .alpha-card:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--kusama-black);
    }

    .alpha-card.mastered {
      background: linear-gradient(135deg, var(--kusama-lime) 0%, var(--kusama-white) 100%);
      border-color: var(--kusama-black);
    }

    .alpha-card.mastered::before {
      background: var(--kusama-cyan);
    }

    .alpha-card.learning {
      background: linear-gradient(135deg, var(--kusama-orange) 0%, var(--kusama-white) 100%);
    }

    .alpha-card.learning::before {
      background: var(--kusama-yellow);
    }

    .alpha-card.new {
      border-style: dashed;
    }

    .alpha-char {
      font-size: 3rem;
      font-weight: 700;
      color: var(--kusama-black);
      line-height: 1;
      margin-bottom: 6px;
    }

    .alpha-pron {
      font-size: 1rem;
      font-weight: 600;
      color: var(--kusama-red);
      text-transform: uppercase;
    }

    .alpha-class {
      font-size: 0.7rem;
      color: var(--kusama-purple);
      font-weight: 600;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Flashcard Mode - Kusama style */
    .flashcard-container {
      perspective: 1000px;
      margin-bottom: 24px;
    }

    .flashcard {
      width: 100%;
      max-width: 420px;
      height: 300px;
      margin: 0 auto;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .flashcard.flipped {
      transform: rotateY(180deg);
    }

    .flashcard-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      border: 6px solid var(--kusama-black);
      box-shadow: 8px 8px 0 var(--kusama-black);
    }

    .flashcard-front {
      background:
        radial-gradient(circle at 20% 80%, var(--kusama-pink) 15%, transparent 15%),
        radial-gradient(circle at 80% 20%, var(--kusama-cyan) 12%, transparent 12%),
        radial-gradient(circle at 40% 40%, var(--kusama-orange) 10%, transparent 10%),
        var(--kusama-yellow);
    }

    .flashcard-back {
      background:
        radial-gradient(circle at 70% 30%, var(--kusama-lime) 15%, transparent 15%),
        radial-gradient(circle at 30% 70%, var(--kusama-pink) 12%, transparent 12%),
        radial-gradient(circle at 60% 80%, var(--kusama-yellow) 10%, transparent 10%),
        var(--kusama-white);
      transform: rotateY(180deg);
    }

    .flashcard-char {
      font-size: 6rem;
      font-weight: 700;
      color: var(--kusama-black);
      text-shadow: 3px 3px 0 var(--kusama-red);
    }

    .flashcard-hint {
      font-size: 0.95rem;
      color: var(--kusama-black);
      margin-top: 16px;
      background: var(--kusama-white);
      padding: 6px 16px;
      border-radius: 20px;
      border: 3px solid var(--kusama-black);
      font-weight: 600;
    }

    .flashcard-pron {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--kusama-red);
      text-transform: uppercase;
      margin-bottom: 12px;
      text-shadow: 2px 2px 0 var(--kusama-yellow);
    }

    .flashcard-vocab {
      font-size: 1.1rem;
      color: var(--kusama-black);
      text-align: center;
      line-height: 1.8;
      background: var(--kusama-white);
      padding: 10px 16px;
      border-radius: 15px;
      border: 3px solid var(--kusama-black);
      width: 100%;
    }

    .flashcard-vocab span {
      display: block;
    }

    .flashcard-class {
      font-size: 0.9rem;
      color: var(--kusama-purple);
      font-weight: 600;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .flashcard-nav {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .flashcard-btn {
      background: var(--kusama-white);
      border: 4px solid var(--kusama-black);
      padding: 14px 32px;
      border-radius: 30px;
      cursor: pointer;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      box-shadow: 5px 5px 0 var(--kusama-black);
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .flashcard-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 var(--kusama-black);
    }

    .flashcard-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--kusama-black);
    }

    .audio-btn {
      background: var(--kusama-purple);
      border: 4px solid var(--kusama-black);
      padding: 10px 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.5rem;
      box-shadow: 4px 4px 0 var(--kusama-black);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .audio-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--kusama-black);
      background: var(--kusama-pink);
    }

    .audio-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--kusama-black);
    }

    .audio-btn.playing {
      animation: pulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    .quiz-audio-hint {
      text-align: center;
      margin-bottom: 16px;
      font-size: 0.9rem;
      color: var(--kusama-black);
      background: var(--kusama-white);
      padding: 8px 16px;
      border-radius: 20px;
      border: 3px solid var(--kusama-black);
      display: inline-block;
    }

    .flashcard-btn.wrong {
      background: var(--kusama-red);
      color: var(--kusama-white);
    }

    .flashcard-btn.correct {
      background: var(--kusama-lime);
      color: var(--kusama-black);
    }

    /* Quiz Mode */
    .quiz-container {
      max-width: 520px;
      margin: 0 auto;
    }

    .quiz-progress {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .quiz-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--kusama-white);
      border: 3px solid var(--kusama-black);
      transition: all 0.2s;
    }

    .quiz-dot.correct {
      background: var(--kusama-lime);
      transform: scale(1.2);
    }

    .quiz-dot.wrong {
      background: var(--kusama-red);
      transform: scale(1.2);
    }

    .quiz-dot.current {
      background: var(--kusama-yellow);
      transform: scale(1.3);
      box-shadow: 0 0 10px var(--kusama-orange);
    }

    .quiz-card {
      background: var(--kusama-white);
      border-radius: 30px;
      padding: 40px;
      text-align: center;
      margin-bottom: 24px;
      border: 6px solid var(--kusama-black);
      box-shadow: 8px 8px 0 var(--kusama-black);
      position: relative;
    }

    .quiz-card::before {
      content: '';
      position: absolute;
      top: 15px;
      right: 15px;
      width: 30px;
      height: 30px;
      background: var(--kusama-pink);
      border-radius: 50%;
      border: 3px solid var(--kusama-black);
    }

    .quiz-card::after {
      content: '';
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 25px;
      height: 25px;
      background: var(--kusama-cyan);
      border-radius: 50%;
      border: 3px solid var(--kusama-black);
    }

    .quiz-char {
      font-size: 7rem;
      font-weight: 700;
      color: var(--kusama-black);
      text-shadow: 4px 4px 0 var(--kusama-yellow);
      line-height: 1;
    }

    .quiz-class {
      font-size: 0.9rem;
      color: var(--kusama-purple);
      font-weight: 600;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .quiz-choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .quiz-choice {
      background: var(--kusama-white);
      border: 4px solid var(--kusama-black);
      color: var(--kusama-black);
      padding: 18px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 1.3rem;
      font-weight: 700;
      box-shadow: 5px 5px 0 var(--kusama-black);
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .quiz-choice:nth-child(1) { background: var(--kusama-yellow); }
    .quiz-choice:nth-child(2) { background: var(--kusama-cyan); }
    .quiz-choice:nth-child(3) { background: var(--kusama-pink); }
    .quiz-choice:nth-child(4) { background: var(--kusama-lime); }

    .quiz-choice:hover {
      transform: translate(-3px, -3px);
      box-shadow: 8px 8px 0 var(--kusama-black);
    }

    .quiz-choice:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--kusama-black);
    }

    .quiz-choice.correct {
      background: var(--kusama-lime);
      border-color: var(--kusama-black);
      transform: scale(1.05);
    }

    .quiz-choice.wrong {
      background: var(--kusama-red);
      color: var(--kusama-white);
      transform: scale(0.95);
    }

    .quiz-choice:disabled {
      cursor: not-allowed;
      opacity: 0.8;
    }

    /* Mistakes Section */
    .mistakes-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .mistake-item {
      background: var(--kusama-white);
      border-radius: 20px;
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      border: 4px solid var(--kusama-black);
      box-shadow: 5px 5px 0 var(--kusama-black);
      position: relative;
    }

    .mistake-item::before {
      content: '';
      position: absolute;
      top: -8px;
      right: 20px;
      width: 25px;
      height: 25px;
      background: var(--kusama-red);
      border-radius: 50%;
      border: 3px solid var(--kusama-black);
    }

    .mistake-char {
      font-size: 3rem;
      font-weight: 700;
      color: var(--kusama-black);
      min-width: 70px;
      text-align: center;
    }

    .mistake-info {
      flex: 1;
    }

    .mistake-pron {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--kusama-red);
      text-transform: uppercase;
    }

    .mistake-confused {
      font-size: 0.85rem;
      color: var(--kusama-purple);
      margin-top: 4px;
    }

    .mistake-count {
      background: var(--kusama-red);
      color: var(--kusama-white);
      padding: 8px 16px;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: 700;
      border: 3px solid var(--kusama-black);
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      background: var(--kusama-white);
      border-radius: 30px;
      border: 4px solid var(--kusama-black);
      box-shadow: 5px 5px 0 var(--kusama-black);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--kusama-black);
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      color: var(--kusama-black);
      font-weight: 600;
    }

    footer span {
      background: var(--kusama-white);
      padding: 6px 16px;
      border-radius: 20px;
      border: 3px solid var(--kusama-black);
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      .alpha-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 12px;
      }

      .alpha-char {
        font-size: 2.5rem;
      }

      .flashcard {
        height: 260px;
      }

      .flashcard-char {
        font-size: 4.5rem;
      }

      .quiz-char {
        font-size: 5rem;
      }

      .quiz-choices {
        grid-template-columns: 1fr;
      }

      .tab-btn {
        padding: 12px 20px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Thai Alphabet</h1>
      <p class="subtitle">Learn with Yayoi Kusama Style</p>
      <div class="kusama-pumpkin"></div>
    </header>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="stat-new">0</div>
        <div class="stat-label">New</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-learning">0</div>
        <div class="stat-label">Learning</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-mastered">0</div>
        <div class="stat-label">Mastered</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-due">0</div>
        <div class="stat-label">Due Today</div>
      </div>
    </div>

    <div class="nav-tabs">
      <button class="tab-btn active" data-tab="alphabet">Alphabet</button>
      <button class="tab-btn" data-tab="flashcard">Flashcards</button>
      <button class="tab-btn" data-tab="quiz">Quiz</button>
      <button class="tab-btn" data-tab="mistakes">Mistakes</button>
    </div>

    <!-- Alphabet Section -->
    <div class="section active" id="section-alphabet">
      <div class="alpha-grid" id="alpha-grid"></div>
    </div>

    <!-- Flashcard Section -->
    <div class="section" id="section-flashcard">
      <div class="flashcard-container">
        <div class="flashcard" id="flashcard">
          <div class="flashcard-face flashcard-front">
            <div class="flashcard-char" id="fc-char">ก</div>
            <div class="flashcard-hint">✨ Tap to reveal!</div>
          </div>
          <div class="flashcard-face flashcard-back">
            <div class="flashcard-pron" id="fc-pron">gor</div>
            <button class="audio-btn" id="fc-audio" title="Play pronunciation">🔊</button>
            <div class="flashcard-vocab" id="fc-vocab"></div>
            <div class="flashcard-class" id="fc-class">Mid Class</div>
          </div>
        </div>
      </div>
      <div class="flashcard-nav">
        <button class="flashcard-btn wrong" id="fc-wrong">❌ Wrong</button>
        <button class="flashcard-btn correct" id="fc-correct">✓ Correct</button>
      </div>
    </div>

    <!-- Quiz Section -->
    <div class="section" id="section-quiz">
      <div class="quiz-container">
        <div class="quiz-progress" id="quiz-progress"></div>
        <div class="quiz-card">
          <div class="quiz-char" id="quiz-char">ก</div>
          <div class="quiz-class" id="quiz-class">Mid Class</div>
        </div>
        <div class="quiz-audio-hint">
          <button class="audio-btn" id="quiz-audio" title="Play pronunciation" style="display: inline-flex; margin: 0 8px 0 0; padding: 8px 14px; font-size: 1.2rem; vertical-align: middle;">🔊</button>
          Click speaker to hear, then pick the right pronunciation!
        </div>
        <div class="quiz-choices" id="quiz-choices"></div>
      </div>
    </div>

    <!-- Mistakes Section -->
    <div class="section" id="section-mistakes">
      <div class="mistakes-list" id="mistakes-list"></div>
    </div>

    <footer>
      <span>🎃 Inspired by Yayoi Kusama's Polka Dot Art 🎃</span>
    </footer>
  </div>

  <script>
    // Thai Alphabet Data with Vocabulary
    const THAI_ALPHABET = [
      { char: 'ก', pron: 'gor', cls: 'Mid', vocab: ['กรง (cage)', 'กานต์ (kan)', 'กิน (eat)'] },
      { char: 'ข', pron: 'khor', cls: 'High', vocab: ['ขนม (sweets)', 'ขา (leg)', 'ขวด (bottle)'] },
      { char: 'ฃ', pron: 'khor', cls: 'High', vocab: ['ฃวด (bottle old)', 'ฃน (rub)'] },
      { char: 'ค', pron: 'khor', cls: 'Low', vocab: ['คน (person)', 'ความ (matter)', 'คุณ (you)'] },
      { char: 'ฅ', pron: 'khor', cls: 'Low', vocab: ['ฅน (person old)'] },
      { char: 'ฆ', pron: 'khor', cls: 'Low', vocab: ['ฆ่า (kill)', 'ฆน (ant)'] },
      { char: 'ง', pron: 'ngor', cls: 'Low', vocab: ['งาน (work)', 'งู (snake)', 'เงิน (money)'] },
      { char: 'จ', pron: 'jor', cls: 'Mid', vocab: ['จาน (plate)', 'จิน (Jin)', 'จัน (Chan)'] },
      { char: 'ฉ', pron: 'chor', cls: 'High', vocab: ['ฉัน (I)', 'ฉลาด (smart)', 'ฉุก (suddenly)'] },
      { char: 'ช', pron: 'chor', cls: 'Low', vocab: ['ช้าง (elephant)', 'ชาติ (nation)', 'ชุม (dense)'] },
      { char: 'ซ', pron: 'sor', cls: 'Low', vocab: ['ซ้าย (left)', 'ซ่อม (repair)'] },
      { char: 'ฌ', pron: 'chor', cls: 'Low', vocab: ['ฌาน (meditation)'] },
      { char: 'ญ', pron: 'yor', cls: 'Low', vocab: ['ญี่ปุ่น (Japan)', 'ญาติ (relative)'] },
      { char: 'ฎ', pron: 'dor', cls: 'Mid', vocab: ['ฎีกา (petition)'] },
      { char: 'ฏ', pron: 'tor', cls: 'Mid', vocab: ['ฏีกา (petition old)'] },
      { char: 'ฐ', pron: 'thor', cls: 'High', vocab: ['ฐาน (base)', 'ฐิ (slowly)'] },
      { char: 'ฑ', pron: 'thor', cls: 'Low', vocab: ['มณโฑ (Monthon)'] },
      { char: 'ฒ', pron: 'thor', cls: 'Low', vocab: ['ฒน (endure)'] },
      { char: 'ณ', pron: 'nor', cls: 'Low', vocab: ['ณาล (then)', 'นักณรรค (monk)'] },
      { char: 'ด', pron: 'dor', cls: 'Mid', vocab: ['ดอก (flower)', 'ดี (good)', 'ดาว (star)'] },
      { char: 'ต', pron: 'tor', cls: 'Mid', vocab: ['ตา (eye)', 'ตัว (self)', 'ไต้ (great)'] },
      { char: 'ถ', pron: 'thor', cls: 'High', vocab: ['ถนน (road)', 'ถาม (ask)', 'ถือ (hold)'] },
      { char: 'ท', pron: 'thor', cls: 'Low', vocab: ['ทาง (road)', 'ทหาร (soldier)', 'ทำ (do)'] },
      { char: 'ธ', pron: 'thor', cls: 'Low', vocab: ['ธนาคาร (bank)', 'ธรรม (dharma)'] },
      { char: 'น', pron: 'nor', cls: 'Low', vocab: ['น้ำ (water)', 'หนู (mouse)', 'ใส่ (put)'] },
      { char: 'บ', pron: 'bor', cls: 'Mid', vocab: ['บ้าน (house)', 'ใหญ่ (big)', 'มะบะ (basil)'] },
      { char: 'ป', pron: 'por', cls: 'Mid', vocab: ['ปลา (fish)', 'ปาก (mouth)', 'ป้า (aunt)'] },
      { char: 'ผ', pron: 'phor', cls: 'High', vocab: ['ผู้ (person)', 'ผึ้ง (bee)', 'ผม (I/hair)'] },
      { char: 'ฝ', pron: 'for', cls: 'High', vocab: ['ฝน (rain)', 'ฝา (lid)', 'ฝึก (practice)'] },
      { char: 'พ', pron: 'phor', cls: 'Low', vocab: ['พี่ (older sibling)', 'พาน (tray)'] },
      { char: 'ฟ', pron: 'for', cls: 'Low', vocab: ['ฟัง (listen)', 'ฟ้า (sky)', 'ฟรี (free)'] },
      { char: 'ภ', pron: 'phor', cls: 'Low', vocab: ['ภาษา (language)', 'ภูมิ (land)'] },
      { char: 'ม', pron: 'mor', cls: 'Mid', vocab: ['ม้า (horse)', 'แม่ (mother)', 'มือ (hand)'] },
      { char: 'ย', pron: 'yor', cls: 'Low', vocab: ['ยี่ (two)', 'ยาย (grandma)'] },
      { char: 'ร', pron: 'ror', cls: 'Low', vocab: ['รถ (car)', 'เรา (we)', 'ไร่ (ranch)'] },
      { char: 'ล', pron: 'lor', cls: 'Low', vocab: ['ลิง (monkey)', 'ลม (wind)', 'เล็ก (small)'] },
      { char: 'ว', pron: 'wor', cls: 'Low', vocab: ['วัน (day)', 'ว่า (that)', 'สวย (beautiful)'] },
      { char: 'ศ', pron: 'sor', cls: 'High', vocab: ['ศาสตร์ (science)', 'ศูนย์ (zero)'] },
      { char: 'ษ', pron: 'sor', cls: 'High', vocab: ['ษา (hereditary)'] },
      { char: 'ส', pron: 'sor', cls: 'High', vocab: ['สวย (beautiful)', 'สาม (three)', 'สุนัข (dog)'] },
      { char: 'ห', pron: 'hor', cls: 'High', vocab: ['หนึ่ง (one)', 'หมา (dog)', 'หัว (head)'] },
      { char: 'ฬ', pron: 'lor', cls: 'Low', vocab: ['ฬอ (bell)'] },
      { char: 'อ', pron: 'or', cls: 'Mid', vocab: ['อาหาร (food)', 'อย่าง (like)', 'อก (chest)'] },
      { char: 'ฮ', pron: 'hor', cls: 'Low', vocab: ['นกฮูก (owl)', 'ฮา (ha!)'] }
    ];

    // Ebbinghaus intervals
    const INTERVALS = {
      new: 0,
      learning: 60 * 60 * 1000,
      reviewing: [
        60 * 60 * 1000,
        24 * 60 * 60 * 1000,
        3 * 24 * 60 * 60 * 1000,
        7 * 24 * 60 * 60 * 1000,
        14 * 24 * 60 * 60 * 1000,
        30 * 24 * 60 * 60 * 1000,
      ]
    };

    // App State
    let state = {
      alphabet: {},
      mistakes: {},
      currentFlashcard: 0,
      flashcardQueue: [],
      quizQueue: [],
      quizIndex: 0,
      quizResults: [],
      currentQuizChar: null
    };

    // Thai text-to-speech using Web Speech API
    function speakThai(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'th-TH';
        utterance.rate = 0.8;
        utterance.pitch = 1;
        // Try to find a Thai voice
        const voices = window.speechSynthesis.getVoices();
        const thaiVoice = voices.find(v => v.lang.includes('th'));
        if (thaiVoice) utterance.voice = thaiVoice;
        window.speechSynthesis.speak(utterance);
        return utterance;
      }
      return null;
    }

    function initAlphabetState() {
      THAI_ALPHABET.forEach((_, index) => {
        if (!state.alphabet[index]) {
          state.alphabet[index] = {
            status: 'new',
            intervalIndex: 0,
            nextReview: Date.now(),
            reviewCount: 0
          };
        }
      });
    }

    function loadState() {
      const saved = localStorage.getItem('thaiLearnerState');
      if (saved) state = JSON.parse(saved);
      initAlphabetState();
    }

    function saveState() {
      localStorage.setItem('thaiLearnerState', JSON.stringify(state));
    }

    function getDueCount() {
      let count = 0;
      const now = Date.now();
      Object.keys(state.alphabet).forEach(key => {
        const item = state.alphabet[key];
        if (item.status === 'new' || item.nextReview <= now) count++;
      });
      return count;
    }

    function getStatusCounts() {
      let newCount = 0, learning = 0, mastered = 0;
      Object.keys(state.alphabet).forEach(key => {
        const item = state.alphabet[key];
        if (item.status === 'new') newCount++;
        else if (item.intervalIndex >= 4) mastered++;
        else learning++;
      });
      return { new: newCount, learning, mastered };
    }

    function updateStats() {
      const counts = getStatusCounts();
      document.getElementById('stat-new').textContent = counts.new;
      document.getElementById('stat-learning').textContent = counts.learning;
      document.getElementById('stat-mastered').textContent = counts.mastered;
      document.getElementById('stat-due').textContent = getDueCount();
    }

    function renderAlphaGrid() {
      const grid = document.getElementById('alpha-grid');
      grid.innerHTML = '';
      THAI_ALPHABET.forEach((letter, index) => {
        const item = state.alphabet[index];
        const card = document.createElement('div');
        card.className = `alpha-card ${item.status}`;
        card.innerHTML = `
          <div class="alpha-char">${letter.char}</div>
          <div class="alpha-pron">${letter.pron}</div>
          <div class="alpha-class">${letter.cls}</div>
        `;
        card.addEventListener('click', () => openFlashcardAt(index));
        grid.appendChild(card);
      });
    }

    function buildFlashcardQueue() {
      const now = Date.now();
      const queue = [];
      THAI_ALPHABET.forEach((_, index) => {
        const item = state.alphabet[index];
        if (item.status === 'new' || item.nextReview <= now) {
          queue.push({ index, priority: item.status === 'new' ? 0 : 1 });
        }
      });
      queue.sort((a, b) => a.priority - b.priority);
      state.flashcardQueue = queue.map(q => q.index);
      state.currentFlashcard = 0;
    }

    function openFlashcardAt(index) {
      state.currentFlashcard = state.flashcardQueue.indexOf(index);
      if (state.currentFlashcard === -1) {
        state.currentFlashcard = state.flashcardQueue.length;
        state.flashcardQueue.push(index);
      }
      showFlashcard();
      switchTab('flashcard');
    }

    function showFlashcard() {
      if (state.flashcardQueue.length === 0) buildFlashcardQueue();
      if (state.currentFlashcard >= state.flashcardQueue.length) {
        buildFlashcardQueue();
        state.currentFlashcard = 0;
      }
      if (state.flashcardQueue.length === 0) return;

      const index = state.flashcardQueue[state.currentFlashcard];
      const letter = THAI_ALPHABET[index];
      document.getElementById('fc-char').textContent = letter.char;
      document.getElementById('fc-pron').textContent = letter.pron;
      document.getElementById('fc-class').textContent = `${letter.cls} Class`;
      document.getElementById('fc-vocab').innerHTML = letter.vocab.map(v => `<span>${v}</span>`).join('');
      document.getElementById('flashcard').classList.remove('flipped');

      // Auto-play pronunciation on flashcard show
      setTimeout(() => speakThai(letter.char), 300);
    }

    function answerFlashcard(correct) {
      const index = state.flashcardQueue[state.currentFlashcard];
      const item = state.alphabet[index];

      if (correct) {
        if (item.status === 'new') {
          item.status = 'learning';
          item.intervalIndex = 0;
        }
        item.intervalIndex++;
        if (item.intervalIndex >= INTERVALS.reviewing.length) {
          item.status = 'mastered';
        }
        item.nextReview = Date.now() + INTERVALS.reviewing[Math.min(item.intervalIndex, INTERVALS.reviewing.length - 1)];
        item.reviewCount++;
      } else {
        item.status = 'learning';
        item.intervalIndex = 0;
        item.nextReview = Date.now() + INTERVALS.learning;
        if (!state.mistakes[index]) {
          state.mistakes[index] = { count: 0, confusedWith: {} };
        }
        state.mistakes[index].count++;
      }
      saveState();
      updateStats();
      state.currentFlashcard++;
      showFlashcard();
    }

    function buildQuizQueue() {
      const queue = [...Array(THAI_ALPHABET.length).keys()];
      for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }
      state.quizQueue = queue;
      state.quizIndex = 0;
      state.quizResults = [];
    }

    function renderQuizProgress() {
      const container = document.getElementById('quiz-progress');
      container.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const dot = document.createElement('div');
        dot.className = 'quiz-dot';
        if (i < state.quizResults.length) {
          dot.classList.add(state.quizResults[i] ? 'correct' : 'wrong');
        } else if (i === state.quizResults.length) {
          dot.classList.add('current');
        }
        container.appendChild(dot);
      }
    }

    function showQuiz() {
      if (state.quizQueue.length === 0 || state.quizIndex >= state.quizQueue.length) {
        buildQuizQueue();
        state.quizIndex = 0;
        state.quizResults = [];
      }
      if (state.quizResults.length >= 10) {
        showQuizSummary();
        return;
      }

      const index = state.quizQueue[state.quizIndex];
      const letter = THAI_ALPHABET[index];
      state.currentQuizChar = letter;
      document.getElementById('quiz-char').textContent = letter.char;
      document.getElementById('quiz-class').textContent = `${letter.cls} Class`;

      const choices = [index];
      while (choices.length < 4) {
        const randIndex = Math.floor(Math.random() * THAI_ALPHABET.length);
        if (!choices.includes(randIndex)) choices.push(randIndex);
      }
      for (let i = choices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [choices[i], choices[j]] = [choices[j], choices[i]];
      }

      const choicesContainer = document.getElementById('quiz-choices');
      choicesContainer.innerHTML = '';
      choices.forEach(choiceIndex => {
        const btn = document.createElement('button');
        btn.className = 'quiz-choice';
        btn.textContent = THAI_ALPHABET[choiceIndex].pron;
        btn.addEventListener('click', () => checkQuizAnswer(choiceIndex, index, btn));
        choicesContainer.appendChild(btn);
      });
      renderQuizProgress();

      // Auto-play pronunciation on quiz show
      setTimeout(() => speakThai(letter.char), 300);
    }

    function checkQuizAnswer(selected, correct, btnEl) {
      document.querySelectorAll('.quiz-choice').forEach(btn => {
        btn.disabled = true;
        const pron = btn.textContent;
        const actualIndex = THAI_ALPHABET.findIndex(l => l.pron === pron);
        if (actualIndex === correct) btn.classList.add('correct');
      });

      const isCorrect = selected === correct;
      state.quizResults.push(isCorrect);

      if (!isCorrect) {
        btnEl.classList.add('wrong');
        if (!state.mistakes[correct]) {
          state.mistakes[correct] = { count: 0, confusedWith: {} };
        }
        state.mistakes[correct].count++;
        state.mistakes[correct].confusedWith[selected] = (state.mistakes[correct].confusedWith[selected] || 0) + 1;

        const item = state.alphabet[correct];
        item.status = 'learning';
        item.intervalIndex = 0;
        item.nextReview = Date.now() + INTERVALS.learning;
      } else {
        const item = state.alphabet[correct];
        if (item.status === 'new') {
          item.status = 'learning';
          item.intervalIndex = 0;
        }
        item.intervalIndex++;
        if (item.intervalIndex >= INTERVALS.reviewing.length) {
          item.status = 'mastered';
        }
        item.nextReview = Date.now() + INTERVALS.reviewing[Math.min(item.intervalIndex, INTERVALS.reviewing.length - 1)];
        item.reviewCount++;
      }
      saveState();
      updateStats();
      renderQuizProgress();
      setTimeout(() => {
        state.quizIndex++;
        showQuiz();
      }, 1000);
    }

    function showQuizSummary() {
      const correct = state.quizResults.filter(r => r).length;
      document.getElementById('quiz-char').textContent = `${correct}/10`;
      document.getElementById('quiz-class').textContent = 'Correct!';
      document.getElementById('quiz-choices').innerHTML = `
        <button class="quiz-choice" onclick="buildQuizQueue(); showQuiz();" style="grid-column: span 2; background: var(--kusama-yellow);">
          🔄 Play Again
        </button>
      `;
      renderQuizProgress();
    }

    function renderMistakes() {
      const container = document.getElementById('mistakes-list');
      const mistakes = Object.keys(state.mistakes)
        .map(key => ({ index: parseInt(key), ...state.mistakes[key] }))
        .filter(m => m.count > 0)
        .sort((a, b) => b.count - a.count);

      if (mistakes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎉</div>
            <p>No mistakes yet! Keep practicing!</p>
          </div>
        `;
        return;
      }

      container.innerHTML = mistakes.map(m => {
        const letter = THAI_ALPHABET[m.index];
        const confusedList = Object.keys(m.confusedWith)
          .map(key => THAI_ALPHABET[parseInt(key)].char)
          .join(', ');
        return `
          <div class="mistake-item">
            <div class="mistake-char">${letter.char}</div>
            <div class="mistake-info">
              <div class="mistake-pron">${letter.pron}</div>
              <div class="mistake-confused">Confused with: ${confusedList}</div>
            </div>
            <div class="mistake-count">${m.count}x</div>
          </div>
        `;
      }).join('');
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });
      document.querySelectorAll('.section').forEach(section => {
        section.classList.toggle('active', section.id === `section-${tabName}`);
      });
      if (tabName === 'flashcard') {
        buildFlashcardQueue();
        showFlashcard();
      } else if (tabName === 'quiz') {
        showQuiz();
      } else if (tabName === 'mistakes') {
        renderMistakes();
      } else if (tabName === 'alphabet') {
        renderAlphaGrid();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadState();
      updateStats();
      renderAlphaGrid();

      // Load voices (needed for some browsers)
      if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
          window.speechSynthesis.getVoices();
        };
      }

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });

      document.getElementById('flashcard').addEventListener('click', function(e) {
        // Don't flip if clicking audio button
        if (e.target.id !== 'fc-audio') {
          this.classList.toggle('flipped');
        }
      });

      document.getElementById('fc-wrong').addEventListener('click', () => answerFlashcard(false));
      document.getElementById('fc-correct').addEventListener('click', () => answerFlashcard(true));

      // Flashcard audio button
      document.getElementById('fc-audio').addEventListener('click', (e) => {
        e.stopPropagation();
        const index = state.flashcardQueue[state.currentFlashcard];
        if (index !== undefined) {
          const letter = THAI_ALPHABET[index];
          const btn = e.target;
          btn.classList.add('playing');
          speakThai(letter.char);
          setTimeout(() => btn.classList.remove('playing'), 500);
        }
      });

      // Quiz audio button
      document.getElementById('quiz-audio').addEventListener('click', (e) => {
        if (state.currentQuizChar) {
          const btn = e.currentTarget;
          btn.classList.add('playing');
          speakThai(state.currentQuizChar.char);
          setTimeout(() => btn.classList.remove('playing'), 500);
        }
      });
    });
  </script>
</body>
